[phases.setup]
nixPkgs = ["python311"]
# grpcio (via google-generativeai) needs libstdc++.so.6 at runtime; nixLibs
# entries are added to LD_LIBRARY_PATH so the C++ stdlib is found.
nixLibs = ["stdenv.cc.cc.lib"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r ./backend/requirements.txt",
  "/opt/venv/bin/pip install -e ./backend --no-deps"
]

[start]
cmd = "cd backend && /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
